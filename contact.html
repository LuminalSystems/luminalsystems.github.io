<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Contact Us - The Luminous Library</title>
  <link rel="stylesheet" href="./css/style.css" />
  <link rel="icon" type="image/x-icon" href="./images/favicon.ico">
  <link href="https://fonts.googleapis.com/css2?family=Satisfy&display=swap" rel="stylesheet">
  <script src="./js/luminous.js" defer></script>
</head>
<body>
  <h1>Contact Us</h1>
  <div id="nav-bar"></div>

  <section class="contact-container">
    <form>
      <label for="name">Name:</label>
      <input type="text" id="name" name="name" placeholder="Your Name" />

      <label for="email">Email:</label>
      <input type="email" id="email" name="email" placeholder="you@example.com" />

      <label for="message">Message:</label>
      <textarea id="message" name="message" rows="6" placeholder="Your message here..."></textarea>

      <button type="submit" formaction="mailto:luminalsystems.dev@gmail.com">Send</button>
    </form>
  </section>
  <div id="footer-container"></div>

</body>
</html>
