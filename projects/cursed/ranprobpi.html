<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RandomProbabilityPi Volume</title>
  <link rel="stylesheet" href="css/ranprobpi_volume.css" />
</head>
<body>
  <div class="container">
    <h1>RandomProbabilityPi Volume</h1>
    <p>Click the Pi Button to randomly set your volume based on the digits of &pi;.</p>
    <button id="rollPi">🎲 PI VOLUME</button>
    <div id="result"></div>
    <div class="volume-bar">
      <div id="volumeFill" class="fill"></div>
    </div>
  </div>
  <script src="js/ranprobpi_volume.js"></script>
</body>
</html>
